<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Відновлення пароля - GREENSHOP</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
    "
  >
    <div
      style="
        background-color: white;
        max-width: 400px;
        margin: 0 auto;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      "
    >
      <div style="text-align: right">
        <a
          href="index.html"
          style="
            cursor: pointer;
            color: #4caf50;
            font-size: 18px;
            text-decoration: none;
          "
          >✕</a
        >
      </div>

      <h2 style="text-align: center; margin-top: 0; color: #333">
        Відновлення пароля
      </h2>

      <p
        style="
          text-align: center;
          color: #666;
          font-size: 14px;
          margin-bottom: 25px;
        "
      >
        Введіть ваш email, і ми надішлемо вам інструкції для відновлення пароля.
      </p>

      <form action="#" method="POST">
        <input
          type="email"
          name="email"
          placeholder="Введіть вашу email адресу"
          required
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
          "
        />

        <button
          type="submit"
          style="
            background-color: #4caf50;
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
          "
        >
          Надіслати інструкції
        </button>
      </form>

      <div style="text-align: center">
        <a
          href="login.html"
          style="color: #555; text-decoration: none; font-size: 14px"
        >
          ← Повернутися до входу
        </a>
      </div>
    </div>
  </body>
</html>
