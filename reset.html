<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Відновлення пароля - GREENSHOP</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="close-btn-wrapper">
        <a href="index.html" class="close-btn">✕</a>
      </div>

      <h2 class="auth-title reset-title">Відновлення пароля</h2>

      <p class="auth-subtitle">
        Введіть ваш email, і ми надішлемо вам інструкції для відновлення пароля.
      </p>

      <form action="#" method="POST">
        <input
          type="email"
          name="email"
          placeholder="Введіть вашу email адресу"
          required
          class="form-input mb-20"
        />
        <button type="submit" class="submit-btn mb-20">
          Надіслати інструкції
        </button>
      </form>

      <div class="back-link-wrapper">
        <a href="login.html" class="back-link">← Повернутися до входу</a>
      </div>
    </div>
  </body>
</html>
