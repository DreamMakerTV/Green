<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Головна - GREENSHOP</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="home-page">
    <header class="header">
      <div class="container">
        <div class="header-logo">
          <a href="index.html" class="logo">
            <img
              src="images/Logo.svg"
              alt="Логотип GreenShop"
              class="logo-img"
            />
          </a>
        </div>

        <nav class="header-nav">
          <a href="index.html" class="nav-link active">Головна</a>
          <a href="shop.html" class="nav-link">Магазин</a>
          <a href="plant-care.html" class="nav-link">Піклування про рослини</a>
          <a href="blogs.html" class="nav-link">Блоги</a>
        </nav>

        <div class="header-actions">
          <a href="login.html" class="btn-login-header">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            Login
          </a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <div class="hero-wrapper">
            <div class="hero-text-block">
              <p class="hero-subtitle">WELCOME TO GREENSHOP</p>
              <h1 class="hero-title">
                LET'S MAKE A BETTER <span class="text-green">PLANET</span>
              </h1>
              <p class="hero-desc">
                Ми — інтернет-магазин з великим вибором стильних та доступних
                кімнатних рослин. Перетворіть свій простір на справжні міські
                джунглі разом з нами. Замовляйте улюблені рослини вже зараз!
              </p>
              <a href="shop.html" class="btn-primary">SHOP NOW</a>
            </div>

            <div class="hero-image-block">
              <img
                src="images/flower.png"
                alt="Рослина у горщику"
                class="hero-img-element"
              />
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
