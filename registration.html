<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Реєстрація - GREENSHOP</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="close-btn-wrapper">
        <a href="index.html" class="close-btn">✕</a>
      </div>

      <h2 class="auth-title">
        <a href="login.html" class="auth-link">Вхід</a>
        <span class="tab-separator">|</span>
        <span class="active-tab">Реєстрація</span>
      </h2>

      <p class="auth-subtitle">Введіть ваш email та пароль для реєстрації.</p>

      <form
        action="index.html"
        method="POST"
        onsubmit="
          window.location.href = 'index.html';
          return false;
        "
      >
        <input
          type="text"
          name="username"
          placeholder="Ім'я користувача"
          required
          class="form-input"
        />
        <input
          type="email"
          name="email"
          placeholder="Введіть вашу email адресу"
          required
          class="form-input"
        />

        <div class="password-wrapper">
          <input
            type="password"
            name="password"
            placeholder="Пароль"
            required
            class="form-input password-input"
          />
          <span onclick="togglePassword(this)" class="password-toggle">
            <svg
              class="eye-open"
              style="display: inline-block"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-open"></use>
            </svg>
            <svg
              class="eye-closed"
              style="display: none"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-closed"></use>
            </svg>
          </span>
        </div>

        <div class="password-wrapper">
          <input
            type="password"
            name="confirm_password"
            placeholder="Підтвердіть пароль"
            required
            class="form-input password-input"
          />
          <span onclick="togglePassword(this)" class="password-toggle">
            <svg
              class="eye-open"
              style="display: inline-block"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-open"></use>
            </svg>
            <svg
              class="eye-closed"
              style="display: none"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-closed"></use>
            </svg>
          </span>
        </div>

        <div class="form-options left-align">
          <label class="checkbox-label">
            <input
              type="checkbox"
              name="terms"
              required
              class="checkbox-input"
            />
            <span class="checkbox-text"
              >Я погоджуюсь з
              <a href="#" class="link-green">Умовами використання</a></span
            >
          </label>
        </div>

        <button type="submit" class="submit-btn">Зареєструватися</button>
      </form>

      <div class="divider">
        <hr />
        <span>Або зареєструйтесь через</span>
      </div>

      <button class="social-btn">
        <svg width="20" height="20">
          <use href="images/sprite.svg#icon-google"></use>
        </svg>
        <span class="social-text">Продовжити з Google</span>
      </button>

      <button class="social-btn">
        <svg class="fb-blue" width="20" height="20">
          <use href="images/sprite.svg#icon-facebook-login"></use>
        </svg>
        <span class="social-text">Продовжити з Facebook</span>
      </button>
    </div>

    <script>
      function togglePassword(iconSpan) {
        const input = iconSpan.previousElementSibling;
        const eyeOpen = iconSpan.querySelector(".eye-open");
        const eyeClosed = iconSpan.querySelector(".eye-closed");

        if (input.type === "password") {
          input.type = "text";
          eyeOpen.style.display = "none";
          eyeClosed.style.display = "inline-block";
        } else {
          input.type = "password";
          eyeOpen.style.display = "inline-block";
          eyeClosed.style.display = "none";
        }
      }
    </script>
  </body>
</html>
