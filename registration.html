<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Реєстрація - GREENSHOP</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-page">
    <div id="preloader-overlay" class="preloader-overlay">
      <div class="loadingio-spinner-reload-2by998twmg8">
        <div class="ldio-yzaezf3dcmj">
          <div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="auth-container">
      <div class="close-btn-wrapper">
        <a href="index.html" class="close-btn">✕</a>
      </div>

      <h2 class="auth-title">
        <a href="login.html" class="auth-link">Вхід</a>
        <span class="tab-separator">|</span>
        <span class="active-tab">Реєстрація</span>
      </h2>

      <p class="auth-subtitle">Введіть ваш email та пароль для реєстрації.</p>

      <form action="index.html" method="POST" onsubmit="fakeLogin(event)">
        <input
          type="text"
          name="username"
          placeholder="Ім'я користувача"
          required
          class="form-input"
          oninvalid="this.setCustomValidity('Будь ласка, заповніть це поле.')"
          oninput="this.setCustomValidity('')"
        />
        <input
          type="email"
          name="email"
          placeholder="Введіть вашу email адресу"
          required
          class="form-input"
          oninvalid="
            this.setCustomValidity('Будь ласка, введіть коректну email адресу.')
          "
          oninput="this.setCustomValidity('')"
        />

        <div class="password-wrapper">
          <input
            type="password"
            name="password"
            placeholder="Пароль"
            required
            class="form-input password-input"
            oninvalid="this.setCustomValidity('Будь ласка, введіть пароль.')"
            oninput="this.setCustomValidity('')"
          />
          <span onclick="togglePassword(this)" class="password-toggle">
            <svg
              class="eye-open"
              style="display: inline-block"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-open"></use>
            </svg>
            <svg
              class="eye-closed"
              style="display: none"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-closed"></use>
            </svg>
          </span>
        </div>

        <div class="password-wrapper">
          <input
            type="password"
            name="confirm_password"
            placeholder="Підтвердіть пароль"
            required
            class="form-input password-input"
          />
          <span onclick="togglePassword(this)" class="password-toggle">
            <svg
              class="eye-open"
              style="display: inline-block"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-open"></use>
            </svg>
            <svg
              class="eye-closed"
              style="display: none"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-closed"></use>
            </svg>
          </span>
        </div>

        <div class="form-options left-align">
          <label class="checkbox-label">
            <input
              type="checkbox"
              name="terms"
              required
              class="checkbox-input"
              oninvalid="
                this.setCustomValidity(
                  'Щоб продовжити, погодьтеся з умовами використання.',
                )
              "
              onchange="this.setCustomValidity('')"
            />
            <span class="checkbox-text"
              >Я погоджуюсь з
              <a href="#" class="link-green">Умовами використання</a></span
            >
          </label>
        </div>

        <button type="submit" class="submit-btn">Зареєструватися</button>
      </form>

      <div class="divider">
        <hr />
        <span>Або зареєструйтесь через</span>
      </div>

      <button type="button" class="social-btn" onclick="fakeLogin(event)">
        <svg width="20" height="20">
          <use href="images/sprite.svg#icon-google"></use>
        </svg>
        <span class="social-text">Продовжити з Google</span>
      </button>

      <button type="button" class="social-btn" onclick="fakeLogin(event)">
        <svg class="fb-blue" width="20" height="20">
          <use href="images/sprite.svg#icon-facebook-login"></use>
        </svg>
        <span class="social-text">Продовжити з Facebook</span>
      </button>
    </div>

    <script>
      function togglePassword(iconSpan) {
        const input = iconSpan.previousElementSibling;
        const eyeOpen = iconSpan.querySelector(".eye-open");
        const eyeClosed = iconSpan.querySelector(".eye-closed");

        if (input.type === "password") {
          input.type = "text";
          eyeOpen.style.display = "none";
          eyeClosed.style.display = "inline-block";
        } else {
          input.type = "password";
          eyeOpen.style.display = "inline-block";
          eyeClosed.style.display = "none";
        }
      }

      function fakeLogin(event) {
        event.preventDefault();
        const preloader = document.getElementById("preloader-overlay");
        preloader.classList.add("active");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1500);
      }

      const passInput = document.querySelector('input[name="password"]');
      const confirmPassInput = document.querySelector(
        'input[name="confirm_password"]',
      );

      function validatePasswords() {
        if (passInput.value !== confirmPassInput.value) {
          confirmPassInput.setCustomValidity("Паролі не співпадають!");
        } else {
          confirmPassInput.setCustomValidity("");
        }
      }

      passInput.addEventListener("input", validatePasswords);
      confirmPassInput.addEventListener("input", validatePasswords);
    </script>
  </body>
</html>
