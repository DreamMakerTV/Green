<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Логін - GREENSHOP</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-page">
    <div id="preloader-overlay" class="preloader-overlay">
      <div class="loadingio-spinner-reload-2by998twmg8">
        <div class="ldio-yzaezf3dcmj">
          <div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="auth-container">
      <div class="close-btn-wrapper">
        <a href="index.html" class="close-btn">✕</a>
      </div>

      <h2 class="auth-title">
        <span class="active-tab">Вхід</span>
        <span class="tab-separator">|</span>
        <a href="registration.html" class="auth-link">Реєстрація</a>
      </h2>

      <p class="auth-subtitle">Введіть ваш email та пароль для входу.</p>

      <form action="index.html" method="POST" onsubmit="fakeLogin(event)">
        <input
          type="email"
          name="email"
          placeholder="Введіть вашу email адресу"
          required
          class="form-input"
          oninvalid="
            this.setCustomValidity('Будь ласка, введіть коректну email адресу.')
          "
          oninput="this.setCustomValidity('')"
        />

        <div class="password-wrapper">
          <input
            type="password"
            name="password"
            placeholder="Пароль"
            required
            class="form-input password-input"
            oninvalid="this.setCustomValidity('Будь ласка, введіть пароль.')"
            oninput="this.setCustomValidity('')"
          />
          <span onclick="togglePassword(this)" class="password-toggle">
            <svg
              class="eye-open"
              style="display: inline-block"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-open"></use>
            </svg>
            <svg
              class="eye-closed"
              style="display: none"
              width="20"
              height="20"
            >
              <use href="images/sprite.svg#icon-eye-closed"></use>
            </svg>
          </span>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" class="checkbox-input" />
            <span class="checkbox-text">Запам'ятати мене</span>
          </label>
          <a href="reset.html" class="link-green">Забули пароль?</a>
        </div>

        <button type="submit" class="submit-btn">Вхід</button>
      </form>

      <div class="divider">
        <hr />
        <span>Або увійдіть через</span>
      </div>

      <button type="button" class="social-btn" onclick="fakeLogin(event)">
        <svg width="20" height="20">
          <use href="images/sprite.svg#icon-google"></use>
        </svg>
        <span class="social-text">Продовжити з Google</span>
      </button>

      <button type="button" class="social-btn" onclick="fakeLogin(event)">
        <svg class="fb-blue" width="20" height="20">
          <use href="images/sprite.svg#icon-facebook-login"></use>
        </svg>
        <span class="social-text">Продовжити з Facebook</span>
      </button>
    </div>

    <script>
      function togglePassword(iconSpan) {
        const input = iconSpan.previousElementSibling;
        const eyeOpen = iconSpan.querySelector(".eye-open");
        const eyeClosed = iconSpan.querySelector(".eye-closed");

        if (input.type === "password") {
          input.type = "text";
          eyeOpen.style.display = "none";
          eyeClosed.style.display = "inline-block";
        } else {
          input.type = "password";
          eyeOpen.style.display = "inline-block";
          eyeClosed.style.display = "none";
        }
      }

      function fakeLogin(event) {
        event.preventDefault();
        const preloader = document.getElementById("preloader-overlay");
        preloader.classList.add("active");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1500);
      }
    </script>
  </body>
</html>
